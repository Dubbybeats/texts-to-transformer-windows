name: Feature request
description: Suggest a safer or friendlier improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for sharing an idea. New-user experience, accessibility, privacy, and wider NVIDIA support are especially welcome.
  - type: textarea
    id: need
    attributes:
      label: What would this help you do?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would a good solution feel like?
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: This request contains no private messages, personal data, databases, datasets, or trained model files.
          required: true
